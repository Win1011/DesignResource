<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Alt B · Hard Split</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; display: flex; justify-content: center; padding: 40px; }
    .poster {
      width: 1080px; height: 1440px;
      display: grid;
      grid-template-columns: 420px 1fr;
      overflow: hidden;
      font-family: "Noto Sans SC", sans-serif;
      background: #fff;
    }
    /* LEFT: typographic poster panel — hard split, not swiss stack */
    .panel {
      background: #111;
      color: #f4f1ea;
      padding: 56px 40px 48px;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .panel::after {
      content: "";
      position: absolute;
      top: 0; right: 0; bottom: 0;
      width: 8px;
      background: #ff5c1a;
    }
    .eyebrow {
      font-size: 16px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #ff5c1a;
      font-weight: 700;
    }
    .giant {
      margin-top: 48px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-size: 92px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: 0.08em;
      height: 820px;
      align-self: flex-start;
    }
    .giant .kw { color: #ff5c1a; }
    .giant .soft { color: #f4f1ea; font-weight: 300; }
    .bottom-copy {
      margin-top: auto;
    }
    .bottom-copy p {
      font-size: 22px;
      line-height: 1.4;
      color: rgba(244,241,234,.75);
      font-weight: 300;
    }
    .bottom-copy .num {
      margin-top: 20px;
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #f4f1ea;
    }
    .bottom-copy .num span {
      display: block;
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(244,241,234,.5);
      font-weight: 500;
      margin-top: 4px;
    }

    /* RIGHT: stacked full-bleed shots, no browser chrome */
    .shots {
      display: grid;
      grid-template-rows: 1.15fr 0.85fr 1fr;
      min-width: 0;
    }
    .shots figure {
      position: relative;
      overflow: hidden;
      margin: 0;
      border-bottom: 3px solid #111;
    }
    .shots figure:last-child { border-bottom: 0; }
    .shots img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .shots figcaption {
      position: absolute;
      left: 20px; bottom: 18px;
      font-size: 14px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #fff;
      background: #111;
      padding: 8px 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="poster" id="cover">
    <aside class="panel">
      <p class="eyebrow">Design Resource</p>
      <h1 class="giant">
        <span class="soft">AI的</span><span class="kw">设计灵感库</span>
      </h1>
      <div class="bottom-copy">
        <p>告诉 AI<br>该看哪、该用哪</p>
        <div class="num">36<span>entries</span></div>
      </div>
    </aside>
    <div class="shots">
      <figure>
        <img src="assets/shot-reactbits.png" alt="">
        <figcaption>CMP · React Bits</figcaption>
      </figure>
      <figure>
        <img src="assets/shot-shader.png" alt="">
        <figcaption>MOT · Shader</figcaption>
      </figure>
      <figure>
        <img src="assets/shot-bentogrids.png" alt="">
        <figcaption>INS · Bento</figcaption>
      </figure>
    </div>
  </section>
</body>
</html>
