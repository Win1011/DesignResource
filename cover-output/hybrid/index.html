<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>AI 的设计灵感库 · Hybrid Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f7f6f2;
      --ink: #111111;
      --mute: #6b6b66;
      --line: #e4e2db;
      --accent: #e85d04; /* tension highlight — not neon cyber */
      --accent-soft: #fff1e6;
      --shot-bg: #eceae4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      padding: 40px;
      font-family: "Inter", "Noto Sans SC", sans-serif;
    }
    .poster {
      width: 1080px;
      height: 1440px;
      background: var(--paper);
      color: var(--ink);
      position: relative;
      overflow: hidden;
      padding: 72px 64px 56px;
      display: flex;
      flex-direction: column;
    }
    /* quiet paper grain — Guizang atmosphere, not HUD */
    .poster::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: "IBM Plex Mono", monospace;
      font-size: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mute);
      position: relative;
      z-index: 1;
    }
    .kicker {
      margin-top: 40px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      position: relative;
      z-index: 1;
    }
    .title {
      margin-top: 20px;
      font-weight: 300;
      font-size: 104px;
      line-height: 1.08;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
    }
    .title .line1 { display: block; color: var(--ink); }
    .title .kw {
      display: inline-block;
      color: var(--accent);
      font-weight: 500;
      /* Douyin light tension: slight lift, not cyber glow */
      transform: rotate(-1.2deg);
      transform-origin: left center;
      border-bottom: 10px solid var(--accent);
      padding-bottom: 2px;
    }
    .lead {
      margin-top: 28px;
      max-width: 820px;
      font-size: 30px;
      line-height: 1.45;
      font-weight: 400;
      color: var(--mute);
      position: relative;
      z-index: 1;
    }
    .stage {
      margin-top: 40px;
      flex: 1;
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      gap: 20px;
      min-height: 0;
      position: relative;
      z-index: 1;
    }
    .hero {
      background: var(--shot-bg);
      border: 1px solid var(--line);
      padding: 18px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .browser {
      flex: 1;
      background: #fff;
      border: 1px solid var(--line);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .browser-bar {
      height: 36px;
      background: #f0eee8;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      flex-shrink: 0;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #cfcbc2;
    }
    .browser img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }
    .side {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }
    .side .hero {
      flex: 1;
      min-height: 0;
    }
    .caption {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      font-family: "IBM Plex Mono", monospace;
      font-size: 15px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--mute);
    }
    .caption strong {
      color: var(--ink);
      font-weight: 500;
    }
    .bottom {
      margin-top: 36px;
      padding-top: 28px;
      border-top: 3px solid var(--ink);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      position: relative;
      z-index: 1;
    }
    .meta-line {
      font-family: "IBM Plex Mono", monospace;
      font-size: 18px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
    }
    .meta-line .hi {
      color: var(--accent);
      font-weight: 600;
    }
    .stat {
      text-align: right;
    }
    .stat .n {
      font-size: 72px;
      font-weight: 200;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }
    .stat .s {
      margin-top: 6px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 16px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mute);
    }
  </style>
</head>
<body>
  <section class="poster" id="cover">
    <div class="top">
      <span>Design Resource</span>
      <span>2026.07</span>
    </div>

    <p class="kicker">For AI Agents</p>
    <h1 class="title">
      <span class="line1">AI 的</span>
      <span class="kw">设计灵感库</span>
    </h1>
    <p class="lead">告诉 AI 该看哪、该用哪 —— 灵感站 / 动效 / 组件 / Skills</p>

    <div class="stage">
      <div class="hero">
        <div class="browser">
          <div class="browser-bar">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
          <img src="assets/shot-reactbits.png" alt="React Bits">
        </div>
        <div class="caption">
          <span>CMP</span>
          <strong>React Bits</strong>
        </div>
      </div>
      <div class="side">
        <div class="hero">
          <div class="browser">
            <div class="browser-bar">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
            <img src="assets/shot-shader.png" alt="Shader Gradient">
          </div>
          <div class="caption">
            <span>MOT</span>
            <strong>Shader</strong>
          </div>
        </div>
        <div class="hero">
          <div class="browser">
            <div class="browser-bar">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
            <img src="assets/shot-awwwards.png" alt="Awwwards">
          </div>
          <div class="caption">
            <span>INS</span>
            <strong>Awwwards</strong>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <p class="meta-line"><span class="hi">INS</span> · CMP · MOT · SKL</p>
      <div class="stat">
        <div class="n">36</div>
        <div class="s">Entries</div>
      </div>
    </div>
  </section>
</body>
</html>
