<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>AI 的设计灵感库 · Claude Design Card</title>
  <style>
    @font-face {
      font-family: 'NotoSerifSC';
      src: url('file:///tmp/claude-design-card/assets/NotoSerifSC-Regular.ttf') format('truetype');
      font-weight: 400;
    }
    :root {
      --pg: #f5f4ed;
      --iv: #faf9f5;
      --nk: #141413;
      --ds: #30302e;
      --tc: #c96442;
      --og: #5e5d59;
      --sg: #87867f;
      --bc: #f0eee6;
      --bw: #e8e6dc;
      --ws: #b0aea5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      padding: 40px;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .card {
      width: 1080px;
      height: 1440px;
      background: var(--ds);
      color: var(--iv);
      position: relative;
      overflow: hidden;
      padding: 72px 64px 64px;
      display: flex;
      flex-direction: column;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ws);
      font-weight: 500;
    }
    .kicker {
      margin-top: 48px;
      font-size: 20px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--tc);
      font-weight: 500;
    }
    .title {
      margin-top: 28px;
      font-family: Georgia, 'NotoSerifSC', 'Times New Roman', serif;
      font-weight: 500;
      font-size: 92px;
      line-height: 1.12;
      color: var(--iv);
      max-width: 920px;
    }
    .title em {
      font-style: normal;
      color: var(--tc);
    }
    .promise {
      margin-top: 36px;
      font-family: Georgia, 'NotoSerifSC', serif;
      font-size: 32px;
      line-height: 1.45;
      color: var(--ws);
      max-width: 820px;
    }
    .rule {
      margin-top: 48px;
      width: 120px;
      height: 3px;
      background: var(--tc);
      border: 0;
    }
    .evidence {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .shot {
      border: 1px solid rgba(250, 249, 245, 0.14);
      background: #1f1f1d;
      overflow: hidden;
      height: 280px;
    }
    .shot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.92;
    }
    .shot-label {
      margin-top: 10px;
      font-size: 16px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ws);
    }
    .bottom {
      margin-top: 36px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-top: 1px solid rgba(250, 249, 245, 0.12);
      padding-top: 24px;
    }
    .bottom .num {
      font-family: Georgia, 'NotoSerifSC', serif;
      font-size: 56px;
      font-weight: 500;
      color: var(--iv);
      line-height: 1;
    }
    .bottom .caption {
      font-size: 22px;
      color: var(--ws);
      text-align: right;
      line-height: 1.4;
    }
    /* geometric editorial mark */
    .mark {
      position: absolute;
      right: 64px;
      top: 220px;
      width: 88px;
      height: 88px;
      border: 2px solid var(--tc);
      opacity: 0.85;
    }
    .mark::after {
      content: '';
      position: absolute;
      left: 18px;
      top: 18px;
      right: 18px;
      bottom: 18px;
      border: 1px solid rgba(201, 100, 66, 0.55);
    }
  </style>
</head>
<body>
  <article class="card" id="card">
    <div class="meta">
      <span>Design Resource</span>
      <span>Vol. 02 · 2026</span>
    </div>
    <p class="kicker">For AI Agents</p>
    <h1 class="title">AI 的<br><em>设计灵感库</em></h1>
    <p class="promise">给 Agent 一份可调用的选型目录：灵感站、动效、组件、Skills，一次读懂该看哪、该用哪。</p>
    <hr class="rule">
    <div class="mark" aria-hidden="true"></div>
    <div class="evidence">
      <div>
        <div class="shot"><img src="file:///tmp/guizang-skill/local-tests/design-resource-cover/assets/shot-reactbits.png" alt=""></div>
        <p class="shot-label">Component · React Bits</p>
      </div>
      <div>
        <div class="shot"><img src="file:///tmp/guizang-skill/local-tests/design-resource-cover/assets/shot-shader.png" alt=""></div>
        <p class="shot-label">Motion · Shader Gradient</p>
      </div>
    </div>
    <div class="bottom">
      <p class="num">36</p>
      <p class="caption">entries curated<br>INS · MOT · CMP · SKL</p>
    </div>
  </article>
</body>
</html>
